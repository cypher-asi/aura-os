<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Aura Desktop Updates</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(69, 122, 255, 0.18), transparent 40%),
          linear-gradient(180deg, #0f172a, #111827);
        color: #e5eefc;
      }

      main {
        max-width: 720px;
        padding: 32px;
        border: 1px solid rgba(229, 238, 252, 0.14);
        border-radius: 20px;
        background: rgba(15, 23, 42, 0.72);
        box-shadow: 0 20px 80px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 5vw, 44px);
      }

      p {
        margin: 0 0 12px;
        line-height: 1.6;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        background: rgba(229, 238, 252, 0.08);
        padding: 2px 6px;
        border-radius: 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Aura Desktop Updates</h1>
      <p>This GitHub Pages site serves desktop update manifests for Aura release channels.</p>
      <p>Expected paths include <code>/nightly/&lt;target&gt;/&lt;arch&gt;.json</code> and <code>/stable/&lt;target&gt;/&lt;arch&gt;.json</code>.</p>
    </main>
  </body>
</html>
