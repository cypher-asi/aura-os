<!doctype html>
<html lang="en" style="background:#000">
  <head>
    <meta charset="UTF-8" />
    <meta name="color-scheme" content="dark" />
    <link rel="icon" type="image/png" href="/aura-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="theme-color" content="#05070d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <style>
      #aura-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 42%, rgba(124, 58, 237, 0.18), transparent 32rem),
          #000;
        color: #f8fafc;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        opacity: 1;
        transition: opacity 180ms ease;
        pointer-events: none;
      }

      #aura-splash .aura-splash-mark {
        display: grid;
        gap: 18px;
        justify-items: center;
        letter-spacing: 0.42em;
        text-indent: 0.42em;
        font-size: 18px;
        font-weight: 700;
      }

      #aura-splash .aura-splash-pulse {
        width: 116px;
        height: 2px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
      }

      #aura-splash .aura-splash-pulse::before {
        content: "";
        display: block;
        width: 42%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.95), transparent);
        animation: aura-splash-scan 900ms ease-in-out infinite;
      }

      html.aura-app-ready #aura-splash {
        opacity: 0;
      }

      html.aura-app-ready #aura-splash.aura-splash-hidden {
        display: none;
      }

      @keyframes aura-splash-scan {
        from {
          transform: translateX(-100%);
        }
        to {
          transform: translateX(240%);
        }
      }
    </style>
    <title>AURA</title>
  </head>
  <body style="background:#000">
    <div id="aura-splash" aria-hidden="true">
      <div class="aura-splash-mark">
        <div>AURA</div>
        <div class="aura-splash-pulse"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
