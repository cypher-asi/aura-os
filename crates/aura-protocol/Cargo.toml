[package]
name = "aura-protocol"
description = "Shared wire protocol types for the Aura harness WebSocket API"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
ts-rs = { version = "10", optional = true, features = ["serde-json-impl"] }

[features]
typescript = ["ts-rs"]
