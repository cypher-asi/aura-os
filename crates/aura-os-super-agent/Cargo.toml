[package]
name = "aura-os-super-agent"
version = "0.1.0"
edition = "2021"

[dependencies]
aura-os-core = { path = "../aura-os-core" }
aura-os-agents = { path = "../aura-os-agents" }
aura-os-projects = { path = "../aura-os-projects" }
aura-os-tasks = { path = "../aura-os-tasks" }
aura-os-sessions = { path = "../aura-os-sessions" }
aura-os-billing = { path = "../aura-os-billing" }
aura-os-orgs = { path = "../aura-os-orgs" }
aura-os-network = { path = "../aura-os-network" }
aura-os-storage = { path = "../aura-os-storage" }
aura-os-store = { path = "../aura-os-store" }
aura-os-link = { path = "../aura-os-link" }
aura-os-process = { path = "../aura-os-process" }
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
futures-util = "0.3"
reqwest = { version = "0.11", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["sync", "rt", "time", "macros"] }
tokio-stream = "0.1"
tokio-util = { version = "0.7", features = ["rt"] }
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
