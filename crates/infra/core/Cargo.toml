[package]
name = "aura-core"
version = "0.2.0"
edition = "2021"

[features]
test-utils = ["dep:tempfile"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
tempfile = { version = "3", optional = true }

[dev-dependencies]
serde_json = "1"
tempfile = "3"
