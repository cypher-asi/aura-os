[package]
name = "aura-store"
version = "0.2.0"
edition = "2021"

[dependencies]
aura-core = { path = "../core" }
rocksdb = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tracing = "0.1"

[dev-dependencies]
tempfile = "3"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4"] }
