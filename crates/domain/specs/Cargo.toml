[package]
name = "aura-specs"
version = "0.1.0"
edition = "2021"

[dependencies]
aura-core = { path = "../../infra/core" }
aura-projects = { path = "../projects" }
aura-store = { path = "../../infra/store" }
aura-storage = { path = "../../infra/storage" }
aura-settings = { path = "../settings" }
aura-claude = { path = "../../infra/claude" }
aura-billing = { path = "../billing" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
thiserror = "1"
