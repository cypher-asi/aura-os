[package]
name = "aura-billing"
version = "0.1.0"
edition = "2021"

[features]
test-utils = ["dep:axum", "dep:tempfile"]

[dependencies]
aura-core = { path = "../../infra/core" }
aura-store = { path = "../../infra/store" }
aura-claude = { path = "../../infra/claude" }
aura-settings = { path = "../settings" }
aura-provider = { path = "../../infra/provider" }
async-trait = "0.1"
futures-util = "0.3"
reqwest = { version = "0.11", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tokio = { version = "1", features = ["full"] }
axum = { version = "0.7", optional = true }
tempfile = { version = "3", optional = true }

[dev-dependencies]
tempfile = "3"
axum = "0.7"
tokio = { version = "1", features = ["full"] }
