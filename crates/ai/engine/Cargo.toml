[package]
name = "aura-engine"
version = "0.1.0"
edition = "2021"

[dependencies]
aura-core = { path = "../../infra/core" }
aura-store = { path = "../../infra/store" }
aura-storage = { path = "../../infra/storage" }
aura-settings = { path = "../../domain/settings" }
aura-claude = { path = "../../infra/claude" }
aura-billing = { path = "../../domain/billing" }
aura-tools = { path = "../tools" }
aura-projects = { path = "../../domain/projects" }
aura-tasks = { path = "../../domain/tasks" }
aura-agents = { path = "../../domain/agents" }
aura-sessions = { path = "../../domain/sessions" }
aura-chat = { path = "../chat" }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
thiserror = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
regex = "1"
futures = "0.3"
url = "2"
aura-network = { path = "../../infra/network" }

[dev-dependencies]
tempfile = "3"
tokio = { version = "1", features = ["full", "test-util"] }
aura-billing = { path = "../../domain/billing", features = ["test-utils"] }
aura-claude = { path = "../../infra/claude" }
aura-storage = { path = "../../infra/storage", features = ["test-utils"] }
