[package]
name = "aura-chat"
version = "0.1.0"
edition = "2021"

[dependencies]
aura-core = { path = "../../infra/core" }
aura-billing = { path = "../../domain/billing" }
aura-store = { path = "../../infra/store" }
aura-storage = { path = "../../infra/storage" }
aura-settings = { path = "../../domain/settings" }
aura-claude = { path = "../../infra/claude" }
aura-link = { path = "../link" }
aura-tools = { path = "../tools" }
aura-projects = { path = "../../domain/projects" }
aura-tasks = { path = "../../domain/tasks" }
aura-specs = { path = "../../domain/specs" }
async-trait = "0.1"
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
futures = "0.3"
thiserror = "1"
glob = "0.3"
regex = "1"

[dev-dependencies]
tempfile = "3"
axum = "0.7"
aura-billing = { path = "../../domain/billing", features = ["test-utils"] }
aura-storage = { path = "../../infra/storage", features = ["test-utils"] }
