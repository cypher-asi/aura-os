[package]
name = "aura-link"
version = "0.1.0"
edition = "2021"

[dependencies]
async-trait = "0.1"
anyhow = "1"
bytes = "1"
futures-core = "0.3"
futures-util = "0.3"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["sync", "rt"] }
tokio-util = { version = "0.7", features = ["io"] }

aura-agent = { path = "../../../../aura-harness/aura-agent" }
aura-reasoner = { path = "../../../../aura-harness/aura-reasoner" }

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }
