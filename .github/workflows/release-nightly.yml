name: Release Nightly

on:
  push:
    branches:
      - main
      - codex/release-build-system
  workflow_dispatch:
    inputs:
      publish_live:
        description: "Publish the GitHub nightly release and gh-pages manifests"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: nightly-release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  AURA_UPDATE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: aarch64
          - os: macos-13
            target: macos
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action/setup@v1

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Compute nightly version
        id: version
        shell: bash
        run: |
          BASE=$(grep '^version' apps/aura-os-desktop/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          NIGHTLY="${BASE}-nightly.${SHORT_SHA}"
          echo "version=${NIGHTLY}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" apps/aura-os-desktop/Cargo.toml
          rm -f apps/aura-os-desktop/Cargo.toml.bak

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build release binary
        env:
          AURA_DESKTOP_USE_PREBUILT_FRONTEND: "1"
          AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
          UPDATER_PUBLIC_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PUBLIC_KEY }}
        run: cargo build --release --package aura-os-desktop

      - name: Package installer
        env:
          AURA_DESKTOP_USE_PREBUILT_FRONTEND: "1"
          AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
        run: cargo packager --release --package aura-os-desktop

      - name: Collect artifacts
        id: artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/bundle/*/*.{exe,dmg,AppImage,deb} dist/ 2>/dev/null || true
          cp target/release/bundle/*/*-setup*.exe dist/ 2>/dev/null || true
          cp target/release/bundle/*/*.sig dist/ 2>/dev/null || true
          ls -la dist/
          echo "dir=dist" >> "$GITHUB_OUTPUT"

      - name: Generate artifact summary and checksums
        shell: bash
        run: |
          node scripts/desktop-release-summary.mjs dist nightly "${{ steps.version.outputs.version }}"
          mv dist/release-summary.json "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.json"
          mv dist/release-summary.md "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.md"
          mv dist/checksums.txt "dist/checksums-${{ matrix.target }}-${{ matrix.arch }}.txt"
          cat "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/

  release:
    needs: build
    if: github.ref_name == 'main' || (github.event_name == 'workflow_dispatch' && inputs.publish_live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compute nightly version
        id: version
        shell: bash
        run: |
          BASE=$(grep '^version' apps/aura-os-desktop/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${BASE}-nightly.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create or update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly (${{ steps.version.outputs.version }})"
          draft: false
          prerelease: true
          make_latest: false
          files: all-artifacts/**/*
          body: |
            Automated nightly build from `main` at ${{ github.sha }}.

            **Version**: `${{ steps.version.outputs.version }}`

      - name: Attach release summary to job
        shell: bash
        run: |
          shopt -s nullglob
          for file in all-artifacts/release-summary-*.md; do
            cat "$file" >> "$GITHUB_STEP_SUMMARY"
          done

  preview-manifests:
    needs: build
    if: github.ref_name != 'main' || (github.event_name == 'workflow_dispatch' && !inputs.publish_live)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute nightly version
        id: version
        shell: bash
        run: |
          BASE=$(grep '^version' apps/aura-os-desktop/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${BASE}-nightly.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate preview update manifests
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="nightly"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          generate_manifest() {
            local target=$1 arch=$2 filename=$3 format=$4
            local sig_file="all-artifacts/${filename}.sig"
            local signature=""
            if [ -f "$sig_file" ]; then
              signature=$(base64 < "$sig_file" | tr -d '\n')
            fi

            mkdir -p "nightly/${target}"
            cat > "nightly/${target}/${arch}.json" <<MANIFEST
          {
            "version": "${VERSION}",
            "url": "${BASE_URL}/${filename}",
            "signature": "${signature}",
            "format": "${format}"
          }
          MANIFEST
          }

          generate_manifest "windows" "x86_64" "aura-os-desktop_${VERSION}_x64-setup.nsis.exe" "nsis"
          generate_manifest "macos" "aarch64" "aura-os-desktop_${VERSION}_aarch64.dmg" "dmg"
          generate_manifest "macos" "x86_64" "aura-os-desktop_${VERSION}_x64.dmg" "dmg"
          generate_manifest "linux" "x86_64" "aura-os-desktop_${VERSION}_amd64.AppImage" "appimage"

      - name: Validate preview manifests
        run: |
          node scripts/desktop-manifest-validate.mjs \
            --root-dir . \
            --channel nightly \
            --output-dir manifest-validation

      - name: Attach preview manifest summary
        shell: bash
        run: |
          {
            echo "## Nightly Preview Mode"
            echo ""
            echo "- Publish skipped because this run was started in validation mode."
            echo ""
            cat manifest-validation/desktop-manifests-nightly.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload preview manifests
        uses: actions/upload-artifact@v4
        with:
          name: nightly-preview-manifests
          path: |
            nightly/**
            manifest-validation/**

  publish-manifests:
    needs: [build, release]
    if: github.ref_name == 'main' || (github.event_name == 'workflow_dispatch' && inputs.publish_live)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compute nightly version
        id: version
        shell: bash
        run: |
          BASE=$(grep '^version' apps/aura-os-desktop/Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${BASE}-nightly.${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate update manifests
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="nightly"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          generate_manifest() {
            local target=$1 arch=$2 filename=$3 format=$4
            local sig_file="all-artifacts/${filename}.sig"
            local signature=""
            if [ -f "$sig_file" ]; then
              signature=$(base64 < "$sig_file" | tr -d '\n')
            fi

            mkdir -p "nightly/${target}"
            cat > "nightly/${target}/${arch}.json" <<MANIFEST
          {
            "version": "${VERSION}",
            "url": "${BASE_URL}/${filename}",
            "signature": "${signature}",
            "format": "${format}"
          }
          MANIFEST
          }

          generate_manifest "windows" "x86_64" "aura-os-desktop_${VERSION}_x64-setup.nsis.exe" "nsis"
          generate_manifest "macos" "aarch64" "aura-os-desktop_${VERSION}_aarch64.dmg" "dmg"
          generate_manifest "macos" "x86_64" "aura-os-desktop_${VERSION}_x64.dmg" "dmg"
          generate_manifest "linux" "x86_64" "aura-os-desktop_${VERSION}_amd64.AppImage" "appimage"

      - name: Validate nightly update manifests
        run: |
          node scripts/desktop-manifest-validate.mjs \
            --root-dir . \
            --channel nightly \
            --output-dir manifest-validation

      - name: Attach nightly manifest summary
        shell: bash
        run: cat manifest-validation/desktop-manifests-nightly.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nightly/
          git diff --cached --quiet || git commit -m "Update nightly manifests for ${{ steps.version.outputs.version }}"
          git push
