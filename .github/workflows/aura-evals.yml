name: Aura Evals

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_live_benchmark:
        description: "Run the live autonomous-build benchmark lane"
        required: false
        default: false
        type: boolean

jobs:
  smoke:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run smoke evals
        run: npm run test:evals:smoke

      - name: Summarize smoke evals
        if: always()
        run: npm run test:evals:report

      - name: Compare smoke evals to baseline
        if: always()
        run: npm run test:evals:compare -- test-results/aura-evals-summary.json ../infra/evals/reports/baselines/smoke-summary.json smoke-compare

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-evals-smoke
          path: |
            interface/playwright-report
            interface/test-results

  workflow-e2e:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run deterministic workflow evals
        run: npm run test:evals:workflow

      - name: Summarize workflow evals
        if: always()
        run: npm run test:evals:report

      - name: Compare workflow evals to baseline
        if: always()
        run: npm run test:evals:compare -- test-results/aura-evals-summary.json ../infra/evals/reports/baselines/workflow-summary.json workflow-compare

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-evals-workflow
          path: |
            interface/playwright-report
            interface/test-results

  behavior-evals:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/evals/promptfoo

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: infra/evals/promptfoo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run behavior evals
        run: npm run eval:ci

      - name: Upload behavior eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-evals-behavior
          path: |
            infra/evals/reports/promptfoo-results.json

  live-benchmark:
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_benchmark
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: interface

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run live benchmark evals
        env:
          AURA_EVAL_LIVE: "1"
          AURA_EVAL_BASE_URL: ${{ secrets.AURA_EVAL_BASE_URL }}
          AURA_EVAL_USER_EMAIL: ${{ secrets.AURA_EVAL_USER_EMAIL }}
          AURA_EVAL_USER_PASSWORD: ${{ secrets.AURA_EVAL_USER_PASSWORD }}
        run: npm run test:evals:benchmark

      - name: Summarize live benchmark evals
        if: always()
        run: npm run test:evals:report

      - name: Upload live benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-evals-live-benchmark
          path: |
            interface/playwright-report
            interface/test-results
