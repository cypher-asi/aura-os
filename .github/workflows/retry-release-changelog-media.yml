name: Retry Release Changelog Media

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Changelog channel to retry media for"
        required: true
        default: nightly
        type: string
      version:
        description: "Optional release version to target"
        required: false
        default: ""
        type: string
      date:
        description: "Optional changelog date to target"
        required: false
        default: ""
        type: string
      preview_url:
        description: "Public preview URL for Browserbase to open"
        required: false
        default: ""
        type: string
      provider:
        description: "Browser automation provider"
        required: true
        default: browserbase
        type: string
      profile:
        description: "Optional screenshot profile override"
        required: false
        default: ""
        type: string
      head_sha:
        description: "Optional repo commit SHA to use for the retry capture logic"
        required: false
        default: ""
        type: string
      source_run_id:
        description: "Optional originating media workflow run id for traceability"
        required: false
        default: ""
        type: string
      deploy_wait_minutes:
        description: "Minutes to wait before retry capture so the deployed frontend can settle"
        required: false
        default: "2"
        type: string

permissions:
  actions: read
  contents: write

concurrency:
  group: changelog-media-${{ inputs.channel }}
  cancel-in-progress: false

jobs:
  retry-media:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve preview URL
        id: preflight
        env:
          INPUT_PREVIEW_URL: ${{ inputs.preview_url }}
          DEFAULT_PREVIEW_URL_VAR: ${{ vars.AURA_DEMO_SCREENSHOT_BASE_URL }}
          DEFAULT_PREVIEW_URL_SECRET: ${{ secrets.AURA_DEMO_SCREENSHOT_BASE_URL }}
          INPUT_PROVIDER: ${{ inputs.provider }}
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
        shell: bash
        run: |
          provider="$INPUT_PROVIDER"
          if [[ -z "$provider" ]]; then
            provider="browserbase"
          fi

          preview_url="$INPUT_PREVIEW_URL"
          preview_source="workflow input"
          if [[ -z "$preview_url" ]]; then
            preview_url="$DEFAULT_PREVIEW_URL_VAR"
            preview_source="repository variable"
          fi
          if [[ -z "$preview_url" ]]; then
            preview_url="$DEFAULT_PREVIEW_URL_SECRET"
            preview_source="repository secret"
          fi
          if [[ -z "$preview_url" ]]; then
            echo "AURA_DEMO_SCREENSHOT_BASE_URL is not configured. Set the repository variable or secret, or pass preview_url when dispatching Retry Release Changelog Media." >&2
            exit 1
          fi

          python3 - "$preview_url" <<'PY'
          from urllib.parse import urlparse
          import sys

          candidate = sys.argv[1].strip()
          parsed = urlparse(candidate)
          if parsed.scheme not in {"http", "https"} or not parsed.netloc:
              raise SystemExit(f"preview_url must be an absolute http(s) URL, got: {candidate}")
          PY

          if [[ "$provider" == "browserbase" ]]; then
            missing=()
            [[ -z "$BROWSERBASE_API_KEY" ]] && missing+=("BROWSERBASE_API_KEY")
            [[ -z "$BROWSERBASE_PROJECT_ID" ]] && missing+=("BROWSERBASE_PROJECT_ID")
            if (( ${#missing[@]} > 0 )); then
              echo "Browserbase provider requires ${missing[*]}." >&2
              exit 1
            fi
          fi

          repo_ref="${{ inputs.head_sha }}"
          if [[ -z "$repo_ref" ]]; then
            repo_ref="main"
          fi

          echo "Resolved preview URL from ${preview_source}."
          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"
          echo "repo_ref=$repo_ref" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.preflight.outputs.repo_ref }}
          fetch-depth: 0
          path: repo

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1
          path: workflow

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          path: pages

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 25.9.0
          cache: npm
          cache-dependency-path: repo/interface/package-lock.json

      - name: Wait for deployed frontend to settle
        env:
          DEFAULT_DEPLOY_WAIT_MINUTES: ${{ vars.AURA_CHANGELOG_MEDIA_DEPLOY_WAIT_MINUTES }}
        shell: bash
        run: |
          wait_minutes="${{ inputs.deploy_wait_minutes }}"
          if [[ -z "$wait_minutes" ]]; then
            wait_minutes="$DEFAULT_DEPLOY_WAIT_MINUTES"
          fi
          if [[ -z "$wait_minutes" ]]; then
            wait_minutes="2"
          fi

          if ! [[ "$wait_minutes" =~ ^[0-9]+$ ]]; then
            echo "deploy_wait_minutes must be an integer number of minutes, got: $wait_minutes" >&2
            exit 1
          fi

          if [[ "$wait_minutes" -le 0 ]]; then
            echo "Skipping deploy settle wait."
            exit 0
          fi

          wait_seconds=$((wait_minutes * 60))
          echo "Waiting ${wait_minutes} minute(s) (${wait_seconds}s) before changelog media retry so the deployed frontend can settle."
          sleep "$wait_seconds"

      - name: Verify preview URL is reachable
        shell: bash
        run: |
          curl \
            --fail \
            --location \
            --silent \
            --show-error \
            --output /dev/null \
            --retry 3 \
            --retry-delay 10 \
            --max-time 30 \
            "${{ steps.preflight.outputs.url }}"

      - name: Install interface dependencies
        working-directory: repo/interface
        run: npm ci

      - name: Retry changelog screenshots into gh-pages
        id: capture
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
        shell: bash
        run: |
          ARGS=(
            --repo-dir repo
            --pages-dir pages
            --channel "${{ inputs.channel }}"
            --provider "${{ steps.preflight.outputs.provider }}"
            --preview-url "${{ steps.preflight.outputs.url }}"
          )

          if [[ -n "${{ inputs.version }}" ]]; then
            ARGS+=(--version "${{ inputs.version }}")
          fi
          if [[ -n "${{ inputs.date }}" ]]; then
            ARGS+=(--date "${{ inputs.date }}")
          fi
          if [[ -n "${{ inputs.profile }}" ]]; then
            ARGS+=(--profile "${{ inputs.profile }}")
          fi

          node repo/infra/scripts/release/publish-changelog-media.mjs "${ARGS[@]}"

      - name: Read changelog media summary
        if: always()
        id: summary
        shell: bash
        run: |
          summary_file="repo/interface/output/demo-screenshots/publish-changelog-media/publish-changelog-media-summary.json"

          if [[ ! -f "$summary_file" ]]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "attempted=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "published=0" >> "$GITHUB_OUTPUT"
            echo "skipped=0" >> "$GITHUB_OUTPUT"
            echo "workflow_outcome=failure" >> "$GITHUB_OUTPUT"
            echo "should_fail=true" >> "$GITHUB_OUTPUT"
            echo "strict_passed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "attempted=$(jq -r '.attempted // 0' "$summary_file")" >> "$GITHUB_OUTPUT"
          echo "failed=$(jq -r '.failed // 0' "$summary_file")" >> "$GITHUB_OUTPUT"
          echo "published=$(jq -r '.published // 0' "$summary_file")" >> "$GITHUB_OUTPUT"
          echo "skipped=$(jq -r '.skipped // 0' "$summary_file")" >> "$GITHUB_OUTPUT"
          workflow_outcome="$(jq -r '.workflowOutcome // "failure"' "$summary_file")"
          should_fail="$(jq -r '.shouldFailWorkflow // true' "$summary_file")"
          echo "workflow_outcome=$workflow_outcome" >> "$GITHUB_OUTPUT"
          echo "should_fail=$should_fail" >> "$GITHUB_OUTPUT"
          echo "strict_passed=$(jq -r '.strictRubricPassed // false' "$summary_file")" >> "$GITHUB_OUTPUT"

      - name: Append changelog media diagnostics summary
        if: always()
        shell: bash
        run: |
          summary_file="repo/interface/output/demo-screenshots/publish-changelog-media/publish-changelog-media-summary.md"
          if [[ -f "$summary_file" ]]; then
            cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [[ -n "${{ inputs.source_run_id }}" ]]; then
            {
              echo ""
              echo "- Source run id: ${{ inputs.source_run_id }}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload changelog media diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: changelog-media-retry-diagnostics-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            repo/interface/output/demo-screenshots/publish-changelog-media
            pages/changelog/${{ inputs.channel }}
            pages/assets/changelog/${{ inputs.channel }}

      - name: Commit and push retried changelog media
        if: always() && steps.summary.outputs.found == 'true'
        shell: bash
        run: |
          label="${{ inputs.version }}"
          if [[ -z "$label" ]]; then
            label="${{ inputs.date }}"
          fi
          if [[ -z "$label" ]]; then
            label="${{ inputs.channel }}"
          fi
          bash workflow/infra/scripts/release/commit-gh-pages-with-retry.sh \
            pages \
            "Retry ${{ inputs.channel }} changelog media for ${label}" \
            "changelog/${{ inputs.channel }}" \
            "assets/changelog/${{ inputs.channel }}"

      - name: Finalize retried changelog media outcome
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.summary.outputs.found }}" != "true" ]]; then
            echo "Changelog media summary was not produced." >&2
            exit 1
          fi

          attempted="${{ steps.summary.outputs.attempted }}"
          published="${{ steps.summary.outputs.published }}"
          failed="${{ steps.summary.outputs.failed }}"
          skipped="${{ steps.summary.outputs.skipped }}"
          workflow_outcome="${{ steps.summary.outputs.workflow_outcome }}"
          should_fail="${{ steps.summary.outputs.should_fail }}"
          capture_outcome="${{ steps.capture.outcome }}"

          if [[ "$should_fail" == "true" ]]; then
            echo "Retried changelog media still did not publish any screenshots for ${attempted} attempted slot(s); ${failed} slot(s) failed." >&2
            exit 1
          fi

          if [[ "$workflow_outcome" == "partial" ]]; then
            echo "::warning::Retry published ${published} screenshot(s), skipped ${skipped}, and left ${failed} failed slot(s) for a later rerun."
            exit 0
          fi

          if [[ "$capture_outcome" == "failure" ]]; then
            echo "::warning::Retry capture reported a recoverable issue, but no failed slots remain after summary processing."
          fi
