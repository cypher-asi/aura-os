name: Desktop Validate

on:
  pull_request:
    paths:
      - .github/actions/**
      - .github/workflows/desktop-validate.yml
      - .github/workflows/release-nightly.yml
      - .github/workflows/release-stable.yml
      - apps/aura-os-desktop/**
      - apps/aura-os-server/**
      - interface/**
      - infra/scripts/release/desktop-ci-smoke.mjs
      - Cargo.lock
      - Cargo.toml
  push:
    branches:
      - main
      - codex/release-build-system
    paths:
      - .github/actions/**
      - .github/workflows/desktop-validate.yml
      - .github/workflows/release-nightly.yml
      - .github/workflows/release-stable.yml
      - apps/aura-os-desktop/**
      - apps/aura-os-server/**
      - interface/**
      - infra/scripts/release/desktop-ci-smoke.mjs
      - Cargo.lock
      - Cargo.toml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  AURA_SERVER_PORT: "19847"
  AURA_UPDATE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
  CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
  CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
  MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
  MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
  MACOS_DEVELOPER_TEAM_ID: ${{ secrets.MACOS_DEVELOPER_TEAM_ID }}
  IOS_APP_STORE_CONNECT_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_ID }}
  IOS_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.IOS_APP_STORE_CONNECT_ISSUER_ID }}
  IOS_APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_BASE64 }}

jobs:
  desktop-smoke:
    env:
      AURA_NETWORK_URL: ${{ vars.AURA_NETWORK_URL }}
      AURA_STORAGE_URL: ${{ vars.AURA_STORAGE_URL }}
      AURA_INTEGRATIONS_URL: ${{ vars.AURA_INTEGRATIONS_URL }}
      AURA_ROUTER_URL: ${{ vars.AURA_ROUTER_URL }}
      Z_BILLING_URL: ${{ vars.Z_BILLING_URL }}
      ORBIT_BASE_URL: ${{ vars.ORBIT_BASE_URL }}
      SWARM_BASE_URL: ${{ vars.SWARM_BASE_URL }}
      REQUIRE_ZERO_PRO: ${{ vars.REQUIRE_ZERO_PRO }}
      AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN: ${{ vars.AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            binary: target/release/aura-os-desktop
          - os: macos-latest
            target: macos-arm64
            binary: target/release/aura-os-desktop
          - os: macos-15-intel
            target: macos-x64
            binary: target/release/aura-os-desktop
          - os: windows-latest
            target: windows-x64
            binary: target/release/aura-os-desktop.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare harness sibling workspace
        uses: ./.github/actions/setup-harness-sibling
        with:
          repository-owner: ${{ github.repository_owner }}
          include-harness: "true"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev xvfb

      - name: Install interface dependencies
        working-directory: interface
        run: npm ci

      - name: Prepare bundled aura-node sidecar
        run: node infra/scripts/release/prepare-desktop-sidecar.mjs

      - name: Build interface
        working-directory: interface
        run: npm run build

      - name: Build desktop release binary
        env:
          AURA_DESKTOP_USE_PREBUILT_FRONTEND: "1"
          AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
          UPDATER_PUBLIC_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PUBLIC_KEY }}
        run: cargo build --release --package aura-os-desktop

      - name: Smoke test built desktop app
        env:
          AURA_DESKTOP_BINARY: ${{ matrix.binary }}
          AURA_DESKTOP_SMOKE_LOG_DIR: desktop-smoke-logs/${{ matrix.target }}
        run: node infra/scripts/release/desktop-ci-smoke.mjs

      - name: Install cargo-packager
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY != ''
        run: cargo install cargo-packager --locked

      - name: Clean stale macOS DMG mounts
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY != '' && startsWith(matrix.target, 'macos-')
        shell: bash
        run: |
          python3 <<'PY'
          import re
          import subprocess

          info = subprocess.run(
              ["hdiutil", "info"],
              capture_output=True,
              text=True,
              check=True,
          ).stdout.splitlines()

          stale_mount = re.compile(r"^/Volumes/Aura(?: \d+)?$")
          devices = []

          for line in info:
              if not line.startswith("/dev/disk"):
                  continue
              parts = line.split("\t")
              device = parts[0]
              mount_point = parts[-1].strip() if len(parts) > 2 else ""
              if stale_mount.match(mount_point):
                  devices.append((device, mount_point))

          for device, mount_point in devices:
              print(f"Detaching stale DMG mount {mount_point} ({device})")
              subprocess.run(["hdiutil", "detach", device], check=True)
          PY

          rm -f target/release/rw.Aura*.dmg

      - name: Prepare macOS signing inputs
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY != '' && startsWith(matrix.target, 'macos-')
        shell: bash
        run: |
          python3 <<'PY'
          import base64
          import os
          import re
          import subprocess
          import tempfile
          from pathlib import Path

          required = [
              "MACOS_DEVELOPER_ID_P12_BASE64",
              "MACOS_DEVELOPER_ID_P12_PASSWORD",
              "IOS_APP_STORE_CONNECT_KEY_ID",
              "IOS_APP_STORE_CONNECT_ISSUER_ID",
              "IOS_APP_STORE_CONNECT_KEY_BASE64",
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit(f"Missing required macOS signing secrets: {', '.join(missing)}")

          temp_dir = Path(tempfile.mkdtemp(prefix="aura-macos-signing-"))
          p12_path = temp_dir / "developer-id.p12"
          p8_path = temp_dir / f"AuthKey_{os.environ['IOS_APP_STORE_CONNECT_KEY_ID']}.p8"

          p12_path.write_bytes(base64.b64decode(os.environ["MACOS_DEVELOPER_ID_P12_BASE64"]))
          p8_path.write_bytes(base64.b64decode(os.environ["IOS_APP_STORE_CONNECT_KEY_BASE64"]))

          pem = subprocess.run(
              [
                  "openssl",
                  "pkcs12",
                  "-in",
                  str(p12_path),
                  "-clcerts",
                  "-nokeys",
                  "-passin",
                  f"pass:{os.environ['MACOS_DEVELOPER_ID_P12_PASSWORD']}",
              ],
              check=True,
              capture_output=True,
              text=True,
          ).stdout

          subject = subprocess.run(
              ["openssl", "x509", "-noout", "-subject", "-nameopt", "RFC2253"],
              input=pem,
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()

          match = re.search(r"CN=((?:\\.|[^,])+)", subject)
          if not match:
              raise SystemExit(f"Unable to derive signing identity from certificate subject: {subject}")
          signing_identity = re.sub(r"\\(.)", r"\1", match.group(1))

          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as fh:
              fh.write(f"APPLE_CERTIFICATE={os.environ['MACOS_DEVELOPER_ID_P12_BASE64']}\n")
              fh.write(f"APPLE_CERTIFICATE_PASSWORD={os.environ['MACOS_DEVELOPER_ID_P12_PASSWORD']}\n")
              fh.write(f"APPLE_API_KEY={os.environ['IOS_APP_STORE_CONNECT_KEY_ID']}\n")
              fh.write(f"APPLE_API_ISSUER={os.environ['IOS_APP_STORE_CONNECT_ISSUER_ID']}\n")
              fh.write(f"APPLE_API_KEY_PATH={p8_path}\n")
              fh.write(f"MACOS_SIGNING_IDENTITY={signing_identity}\n")
          PY

      - name: Inject macOS signing identity into packager config
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY != '' && startsWith(matrix.target, 'macos-')
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          cargo_toml = Path("apps/aura-os-desktop/Cargo.toml")
          text = cargo_toml.read_text(encoding="utf-8")
          escaped_identity = (
              os.environ["MACOS_SIGNING_IDENTITY"]
              .replace("\\", "\\\\")
              .replace('"', '\\"')
          )
          identity_line = f'signing-identity = "{escaped_identity}"'

          if "signing-identity =" in text:
              text = re.sub(r'^signing-identity = ".*"$', identity_line, text, flags=re.MULTILINE)
          else:
              marker = "[package.metadata.packager.macos]\n"
              if marker not in text:
                  raise SystemExit("Missing [package.metadata.packager.macos] section in Cargo.toml")
              text = text.replace(marker, marker + identity_line + "\n", 1)

          cargo_toml.write_text(text, encoding="utf-8")
          PY

      - name: Validate macOS packager manifest
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY != '' && startsWith(matrix.target, 'macos-')
        run: cargo metadata --no-deps --manifest-path apps/aura-os-desktop/Cargo.toml > /dev/null

      - name: Package desktop artifact
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY != ''
        env:
          AURA_DESKTOP_USE_PREBUILT_FRONTEND: "1"
          AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
        run: cargo packager --release --packages aura-os-desktop

      - name: Collect packaged artifacts
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY != ''
        shell: bash
        run: |
          mkdir -p packaged/${{ matrix.target }}
          cp target/release/*.{exe,dmg,AppImage,deb} packaged/${{ matrix.target }}/ 2>/dev/null || true
          cp target/release/*.app.tar.gz packaged/${{ matrix.target }}/ 2>/dev/null || true
          cp -R target/release/*.app packaged/${{ matrix.target }}/ 2>/dev/null || true
          cp target/release/*-setup*.exe packaged/${{ matrix.target }}/ 2>/dev/null || true
          cp target/release/*.sig packaged/${{ matrix.target }}/ 2>/dev/null || true
          cp target/release/bundle/*/*.{exe,dmg,AppImage,deb} packaged/${{ matrix.target }}/ 2>/dev/null || true
          cp target/release/bundle/*/*.app.tar.gz packaged/${{ matrix.target }}/ 2>/dev/null || true
          cp -R target/release/bundle/*/*.app packaged/${{ matrix.target }}/ 2>/dev/null || true
          cp target/release/bundle/*/*-setup*.exe packaged/${{ matrix.target }}/ 2>/dev/null || true
          cp target/release/bundle/*/*.sig packaged/${{ matrix.target }}/ 2>/dev/null || true
          if [ "${{ matrix.target }}" = "macos-arm64" ] || [ "${{ matrix.target }}" = "macos-x64" ]; then
            arch_suffix="x86_64"
            if [ "${{ matrix.target }}" = "macos-arm64" ]; then
              arch_suffix="aarch64"
            fi
            for bundle in packaged/${{ matrix.target }}/*.app.tar.gz; do
              [ -e "$bundle" ] || continue
              renamed="packaged/${{ matrix.target }}/aura-os-desktop_${arch_suffix}.app.tar.gz"
              mv "$bundle" "$renamed"
              if [ -f "${bundle}.sig" ]; then
                mv "${bundle}.sig" "${renamed}.sig"
              fi
            done
          fi
          ls -la packaged/${{ matrix.target }}/

      - name: Normalize signing key
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY != ''
        shell: bash
        run: |
          normalized="$(python infra/scripts/release/normalize-packager-key.py)"
          if [ -n "$normalized" ]; then
            echo "CARGO_PACKAGER_SIGN_PRIVATE_KEY=$normalized" >> "$GITHUB_ENV"
          fi

      - name: Sign packaged updater artifacts
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY != ''
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ env.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ env.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
        run: node infra/scripts/release/desktop-sign-artifacts.mjs --dir packaged/${{ matrix.target }} --prune-app-bundles

      - name: Note when packaging is skipped
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY == ''
        shell: bash
        run: |
          echo "Desktop packaging skipped on this run because signing secrets are unavailable." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload desktop smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-smoke-${{ matrix.target }}
          path: desktop-smoke-logs/${{ matrix.target }}

      - name: Upload packaged desktop artifacts
        if: env.CARGO_PACKAGER_SIGN_PRIVATE_KEY != ''
        uses: actions/upload-artifact@v4
        with:
          name: desktop-package-${{ matrix.target }}
          path: packaged/${{ matrix.target }}
