name: Release Stable

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: aarch64
          - os: macos-13
            target: macos
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-action/setup@v1

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from tag
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" apps/aura-os-desktop/Cargo.toml
          rm -f apps/aura-os-desktop/Cargo.toml.bak

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Build interface
        working-directory: interface
        run: |
          npm ci
          npm run build

      - name: Build release binary
        env:
          UPDATER_PUBLIC_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PUBLIC_KEY }}
        run: cargo build --release --package aura-os-desktop

      - name: Package installer
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
        run: cargo packager --release --package aura-os-desktop

      - name: Collect artifacts
        id: artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/bundle/*/*.{exe,dmg,AppImage,deb} dist/ 2>/dev/null || true
          cp target/release/bundle/*/*-setup*.exe dist/ 2>/dev/null || true
          cp target/release/bundle/*/*.sig dist/ 2>/dev/null || true
          ls -la dist/
          echo "dir=dist" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Aura ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: all-artifacts/**/*

  publish-manifests:
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate update manifests
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          generate_manifest() {
            local target=$1 arch=$2 filename=$3 format=$4
            local sig_file="all-artifacts/${filename}.sig"
            local signature=""
            if [ -f "$sig_file" ]; then
              signature=$(cat "$sig_file")
            fi

            mkdir -p "stable/${target}"
            cat > "stable/${target}/${arch}.json" <<MANIFEST
          {
            "version": "${VERSION}",
            "url": "${BASE_URL}/${filename}",
            "signature": "${signature}",
            "format": "${format}"
          }
          MANIFEST
          }

          generate_manifest "windows" "x86_64" "aura-os-desktop_${VERSION}_x64-setup.nsis.exe" "nsis"
          generate_manifest "macos" "aarch64" "aura-os-desktop_${VERSION}_aarch64.dmg" "dmg"
          generate_manifest "macos" "x86_64" "aura-os-desktop_${VERSION}_x64.dmg" "dmg"
          generate_manifest "linux" "x86_64" "aura-os-desktop_${VERSION}_amd64.AppImage" "appimage"

      - name: Commit and push manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stable/
          git diff --cached --quiet || git commit -m "Update stable manifests for ${{ steps.version.outputs.version }}"
          git push
