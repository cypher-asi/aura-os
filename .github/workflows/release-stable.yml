name: Release Stable

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.0.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  AURA_UPDATE_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

jobs:
  build:
    env:
      AURA_NETWORK_URL: ${{ vars.AURA_NETWORK_URL }}
      AURA_STORAGE_URL: ${{ vars.AURA_STORAGE_URL }}
      AURA_INTEGRATIONS_URL: ${{ vars.AURA_INTEGRATIONS_URL }}
      AURA_ROUTER_URL: ${{ vars.AURA_ROUTER_URL }}
      Z_BILLING_URL: ${{ vars.Z_BILLING_URL }}
      ORBIT_BASE_URL: ${{ vars.ORBIT_BASE_URL }}
      SWARM_BASE_URL: ${{ vars.SWARM_BASE_URL }}
      REQUIRE_ZERO_PRO: ${{ vars.REQUIRE_ZERO_PRO }}
      AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN: ${{ vars.AURA_DISABLE_LOCAL_HARNESS_AUTOSPAWN }}
      MACOS_DEVELOPER_ID_P12_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_P12_BASE64 }}
      MACOS_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_P12_PASSWORD }}
      MACOS_DEVELOPER_TEAM_ID: ${{ secrets.MACOS_DEVELOPER_TEAM_ID }}
      IOS_APP_STORE_CONNECT_KEY_ID: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_ID }}
      IOS_APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.IOS_APP_STORE_CONNECT_ISSUER_ID }}
      IOS_APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.IOS_APP_STORE_CONNECT_KEY_BASE64 }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            arch: x86_64
          - os: macos-latest
            target: macos
            arch: aarch64
          - os: macos-15-intel
            target: macos
            arch: x86_64
          - os: windows-latest
            target: windows
            arch: x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Prepare harness sibling workspace
        uses: ./.github/actions/setup-harness-sibling
        with:
          repository-owner: ${{ github.repository_owner }}
          include-harness: "true"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: interface/package-lock.json

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from tag
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Patch Cargo.toml version
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i.bak "s/^version = \".*\"/version = \"${VERSION}\"/" apps/aura-os-desktop/Cargo.toml
          rm -f apps/aura-os-desktop/Cargo.toml.bak

      - name: Install cargo-packager
        run: cargo install cargo-packager --locked

      - name: Prepare bundled aura-node sidecar
        run: node infra/scripts/release/prepare-desktop-sidecar.mjs

      - name: Build interface
        working-directory: interface
        run: |
          npm ci
          npm run build

      - name: Build release binary
        env:
          AURA_DESKTOP_USE_PREBUILT_FRONTEND: "1"
          AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
          UPDATER_PUBLIC_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PUBLIC_KEY }}
        run: cargo build --release --package aura-os-desktop

      - name: Clean stale macOS DMG mounts
        if: matrix.target == 'macos'
        shell: bash
        run: |
          python3 <<'PY'
          import re
          import subprocess

          info = subprocess.run(
              ["hdiutil", "info"],
              capture_output=True,
              text=True,
              check=True,
          ).stdout.splitlines()

          stale_mount = re.compile(r"^/Volumes/Aura(?: \d+)?$")
          devices = []

          for line in info:
              if not line.startswith("/dev/disk"):
                  continue
              parts = line.split("\t")
              device = parts[0]
              mount_point = parts[-1].strip() if len(parts) > 2 else ""
              if stale_mount.match(mount_point):
                  devices.append((device, mount_point))

          for device, mount_point in devices:
              print(f"Detaching stale DMG mount {mount_point} ({device})")
              subprocess.run(["hdiutil", "detach", device], check=True)
          PY

          rm -f target/release/rw.Aura*.dmg

      - name: Prepare macOS signing inputs
        if: matrix.target == 'macos'
        shell: bash
        run: |
          python3 <<'PY'
          import base64
          import os
          import re
          import subprocess
          import tempfile
          from pathlib import Path

          required = [
              "MACOS_DEVELOPER_ID_P12_BASE64",
              "MACOS_DEVELOPER_ID_P12_PASSWORD",
              "IOS_APP_STORE_CONNECT_KEY_ID",
              "IOS_APP_STORE_CONNECT_ISSUER_ID",
              "IOS_APP_STORE_CONNECT_KEY_BASE64",
          ]
          missing = [name for name in required if not os.environ.get(name)]
          if missing:
              raise SystemExit(f"Missing required macOS signing secrets: {', '.join(missing)}")

          temp_dir = Path(tempfile.mkdtemp(prefix="aura-macos-signing-"))
          p12_path = temp_dir / "developer-id.p12"
          p8_path = temp_dir / f"AuthKey_{os.environ['IOS_APP_STORE_CONNECT_KEY_ID']}.p8"

          p12_path.write_bytes(base64.b64decode(os.environ["MACOS_DEVELOPER_ID_P12_BASE64"]))
          p8_path.write_bytes(base64.b64decode(os.environ["IOS_APP_STORE_CONNECT_KEY_BASE64"]))

          pem = subprocess.run(
              [
                  "openssl",
                  "pkcs12",
                  "-in",
                  str(p12_path),
                  "-clcerts",
                  "-nokeys",
                  "-passin",
                  f"pass:{os.environ['MACOS_DEVELOPER_ID_P12_PASSWORD']}",
              ],
              check=True,
              capture_output=True,
              text=True,
          ).stdout

          subject = subprocess.run(
              ["openssl", "x509", "-noout", "-subject", "-nameopt", "RFC2253"],
              input=pem,
              check=True,
              capture_output=True,
              text=True,
          ).stdout.strip()

          match = re.search(r"CN=([^,]+)", subject)
          if not match:
              raise SystemExit(f"Unable to derive signing identity from certificate subject: {subject}")
          signing_identity = match.group(1)

          env_path = Path(os.environ["GITHUB_ENV"])
          with env_path.open("a", encoding="utf-8") as fh:
              fh.write(f"APPLE_CERTIFICATE={os.environ['MACOS_DEVELOPER_ID_P12_BASE64']}\n")
              fh.write(f"APPLE_CERTIFICATE_PASSWORD={os.environ['MACOS_DEVELOPER_ID_P12_PASSWORD']}\n")
              fh.write(f"APPLE_API_KEY={os.environ['IOS_APP_STORE_CONNECT_KEY_ID']}\n")
              fh.write(f"APPLE_API_ISSUER={os.environ['IOS_APP_STORE_CONNECT_ISSUER_ID']}\n")
              fh.write(f"APPLE_API_KEY_PATH={p8_path}\n")
              fh.write(f"MACOS_SIGNING_IDENTITY={signing_identity}\n")
          PY

      - name: Inject macOS signing identity into packager config
        if: matrix.target == 'macos'
        shell: bash
        run: |
          python3 <<'PY'
          import os
          import re
          from pathlib import Path

          cargo_toml = Path("apps/aura-os-desktop/Cargo.toml")
          text = cargo_toml.read_text(encoding="utf-8")
          identity_line = f'signing-identity = "{os.environ["MACOS_SIGNING_IDENTITY"]}"'

          if "signing-identity =" in text:
              text = re.sub(r'^signing-identity = ".*"$', identity_line, text, flags=re.MULTILINE)
          else:
              marker = "[package.metadata.packager.macos]\n"
              if marker not in text:
                  raise SystemExit("Missing [package.metadata.packager.macos] section in Cargo.toml")
              text = text.replace(marker, marker + identity_line + "\n", 1)

          cargo_toml.write_text(text, encoding="utf-8")
          PY

      - name: Package installer
        env:
          AURA_DESKTOP_USE_PREBUILT_FRONTEND: "1"
          AURA_UPDATE_BASE_URL: ${{ env.AURA_UPDATE_BASE_URL }}
        run: cargo packager --release --packages aura-os-desktop

      - name: Collect artifacts
        id: artifacts
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/*.{exe,dmg,AppImage,deb} dist/ 2>/dev/null || true
          cp target/release/*.app.tar.gz dist/ 2>/dev/null || true
          cp -R target/release/*.app dist/ 2>/dev/null || true
          cp target/release/*-setup*.exe dist/ 2>/dev/null || true
          cp target/release/*.sig dist/ 2>/dev/null || true
          cp target/release/bundle/*/*.{exe,dmg,AppImage,deb} dist/ 2>/dev/null || true
          cp target/release/bundle/*/*.app.tar.gz dist/ 2>/dev/null || true
          cp -R target/release/bundle/*/*.app dist/ 2>/dev/null || true
          cp target/release/bundle/*/*-setup*.exe dist/ 2>/dev/null || true
          cp target/release/bundle/*/*.sig dist/ 2>/dev/null || true
          if [ "${{ matrix.target }}" = "macos" ]; then
            for bundle in dist/*.app.tar.gz; do
              [ -e "$bundle" ] || continue
              renamed="dist/aura-os-desktop_${{ steps.version.outputs.version }}_${{ matrix.arch }}.app.tar.gz"
              mv "$bundle" "$renamed"
              if [ -f "${bundle}.sig" ]; then
                mv "${bundle}.sig" "${renamed}.sig"
              fi
            done
            if ! ls dist/*.app.tar.gz >/dev/null 2>&1; then
              for app_bundle in dist/*.app; do
                [ -e "$app_bundle" ] || continue
                archive_path="dist/aura-os-desktop_${{ steps.version.outputs.version }}_${{ matrix.arch }}.app.tar.gz"
                COPYFILE_DISABLE=1 tar -czf "$archive_path" -C dist "$(basename "$app_bundle")"
                break
              done
            fi
          fi
          ls -la dist/
          echo "dir=dist" >> "$GITHUB_OUTPUT"

      - name: Normalize signing key
        shell: bash
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
        run: |
          normalized="$(python infra/scripts/release/normalize-packager-key.py)"
          if [ -n "$normalized" ]; then
            echo "CARGO_PACKAGER_SIGN_PRIVATE_KEY=$normalized" >> "$GITHUB_ENV"
          fi

      - name: Sign packaged updater artifacts
        env:
          CARGO_PACKAGER_SIGN_PRIVATE_KEY: ${{ env.CARGO_PACKAGER_SIGN_PRIVATE_KEY }}
          CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD: ${{ secrets.CARGO_PACKAGER_SIGN_PRIVATE_KEY_PASSWORD }}
        run: node infra/scripts/release/desktop-sign-artifacts.mjs --dir dist --prune-app-bundles

      - name: Generate artifact summary and checksums
        shell: bash
        run: |
          node infra/scripts/release/desktop-release-summary.mjs dist stable "${{ steps.version.outputs.version }}"
          mv dist/release-summary.json "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.json"
          mv dist/release-summary.md "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.md"
          mv dist/checksums.txt "dist/checksums-${{ matrix.target }}-${{ matrix.arch }}.txt"
          cat "dist/release-summary-${{ matrix.target }}-${{ matrix.arch }}.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.target }}-${{ matrix.arch }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Aura ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: all-artifacts/**/*

      - name: Attach release summary to job
        shell: bash
        run: |
          shopt -s nullglob
          for file in all-artifacts/release-summary-*.md; do
            cat "$file" >> "$GITHUB_STEP_SUMMARY"
          done

  publish-manifests:
    needs: [build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          path: repo

      - uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0
          path: pages

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: Generate update manifests
        shell: bash
        run: |
          cd repo
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"

          generate_manifest() {
            local target=$1 arch=$2 filename=$3 format=$4
            local sig_file="../all-artifacts/${filename}.sig"
            local signature='""'
            if [ -f "$sig_file" ]; then
              signature=$(jq -Rs . < "$sig_file")
            fi

            mkdir -p "../pages/stable/${target}"
            cat > "../pages/stable/${target}/${arch}.json" <<MANIFEST
          {
            "version": "${VERSION}",
            "url": "${BASE_URL}/${filename}",
            "signature": ${signature},
            "format": "${format}"
          }
          MANIFEST
          }

          generate_manifest "windows" "x86_64" "aura-os-desktop_${VERSION}_x64-setup.exe" "nsis"
          generate_manifest "macos" "aarch64" "aura-os-desktop_${VERSION}_aarch64.app.tar.gz" "app"
          generate_manifest "macos" "x86_64" "aura-os-desktop_${VERSION}_x86_64.app.tar.gz" "app"
          generate_manifest "linux" "x86_64" "aura-os-desktop_${VERSION}_x86_64.AppImage" "appimage"

          mkdir -p "../pages/downloads"
          cat > "../pages/downloads/stable.json" <<MANIFEST
          {
            "channel": "stable",
            "version": "${VERSION}",
            "release_url": "https://github.com/${{ github.repository }}/releases/tag/${TAG}",
            "generated_at": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "desktop": {
              "windows": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/aura-os-desktop_${VERSION}_x64-setup.exe"
              },
              "mac": {
                "apple-silicon": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/Aura_${VERSION}_aarch64.dmg"
                },
                "intel": {
                  "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/Aura_${VERSION}_x64.dmg"
                }
              },
              "linux": {
                "url": "https://github.com/${{ github.repository }}/releases/download/${TAG}/aura-os-desktop_${VERSION}_x86_64.AppImage"
              }
            }
          }
          MANIFEST

      - name: Validate stable update manifests
        run: |
          cd repo
          node infra/scripts/release/desktop-manifest-validate.mjs \
            --root-dir ../pages \
            --channel stable \
            --output-dir ../manifest-validation

      - name: Validate stable download manifest
        run: |
          cd repo
          node infra/scripts/release/desktop-downloads-validate.mjs \
            --manifest ../pages/downloads/stable.json \
            --artifacts-dir ../all-artifacts \
            --channel stable \
            --output-dir ../manifest-validation

      - name: Attach stable manifest summary
        shell: bash
        run: |
          cat manifest-validation/desktop-manifests-stable.md >> "$GITHUB_STEP_SUMMARY"
          cat manifest-validation/desktop-downloads-stable.md >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push manifests
        run: |
          cd pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stable/ downloads/stable.json
          git diff --cached --quiet || git commit -m "Update stable manifests for ${{ steps.version.outputs.version }}"
          git push
