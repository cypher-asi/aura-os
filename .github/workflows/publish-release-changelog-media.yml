name: Publish Release Changelog Media

on:
  workflow_dispatch:
    inputs:
      preview_url:
        description: "Public preview URL for Browserbase to open"
        required: false
        default: ""
        type: string
      channel:
        description: "Changelog channel to publish media for"
        required: true
        default: nightly
        type: string
      version:
        description: "Release version to publish media for"
        required: false
        default: ""
        type: string
      date:
        description: "Changelog date to publish media for"
        required: false
        default: ""
        type: string
      head_sha:
        description: "Repo commit SHA to use for the media capture logic"
        required: false
        default: ""
        type: string
      provider:
        description: "Browser automation provider"
        required: true
        default: browserbase
        type: string
      profile:
        description: "Optional screenshot profile override"
        required: false
        default: ""
        type: string
      deploy_wait_minutes:
        description: "Minutes to wait before capture so the deployed frontend can settle"
        required: false
        default: "5"
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: publish-release-changelog-media-${{ inputs.channel }}-${{ inputs.version || inputs.date || github.run_id }}
  cancel-in-progress: true

jobs:
  publish-media:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve changelog target
        id: target
        shell: bash
        run: |
          if [[ -z "${{ inputs.channel }}" ]]; then
            echo "channel is required" >&2
            exit 1
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"
          echo "channel=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
          echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "date=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
          echo "head_sha=${{ inputs.head_sha }}" >> "$GITHUB_OUTPUT"

      - name: Preflight media configuration
        if: steps.target.outputs.ready == 'true'
        id: preflight
        env:
          INPUT_PREVIEW_URL: ${{ inputs.preview_url }}
          DEFAULT_PREVIEW_URL_VAR: ${{ vars.AURA_DEMO_SCREENSHOT_BASE_URL }}
          DEFAULT_PREVIEW_URL_SECRET: ${{ secrets.AURA_DEMO_SCREENSHOT_BASE_URL }}
          INPUT_PROVIDER: ${{ inputs.provider }}
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
        shell: bash
        run: |
          provider="$INPUT_PROVIDER"
          if [[ -z "$provider" ]]; then
            provider="browserbase"
          fi

          preview_url="$INPUT_PREVIEW_URL"
          preview_source="workflow input"
          if [[ -z "$preview_url" ]]; then
            preview_url="$DEFAULT_PREVIEW_URL_VAR"
            preview_source="repository variable"
          fi
          if [[ -z "$preview_url" ]]; then
            preview_url="$DEFAULT_PREVIEW_URL_SECRET"
            preview_source="repository secret"
          fi
          if [[ -z "$preview_url" ]]; then
            echo "AURA_DEMO_SCREENSHOT_BASE_URL is not configured. Set the repository variable or secret, or pass preview_url when manually dispatching Publish Release Changelog Media." >&2
            exit 1
          fi

          python3 - "$preview_url" <<'PY'
          from urllib.parse import urlparse
          import sys

          candidate = sys.argv[1].strip()
          parsed = urlparse(candidate)
          if parsed.scheme not in {"http", "https"} or not parsed.netloc:
              raise SystemExit(f"preview_url must be an absolute http(s) URL, got: {candidate}")
          PY

          if [[ "$provider" == "browserbase" ]]; then
            missing=()
            [[ -z "$BROWSERBASE_API_KEY" ]] && missing+=("BROWSERBASE_API_KEY")
            [[ -z "$BROWSERBASE_PROJECT_ID" ]] && missing+=("BROWSERBASE_PROJECT_ID")
            if (( ${#missing[@]} > 0 )); then
              echo "Browserbase provider requires ${missing[*]}." >&2
              exit 1
            fi
          fi

          echo "Resolved preview URL from ${preview_source}."
          echo "provider=$provider" >> "$GITHUB_OUTPUT"
          echo "url=$preview_url" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.target.outputs.ready == 'true'
        with:
          ref: ${{ steps.target.outputs.head_sha || github.sha }}
          fetch-depth: 0
          path: repo

      - uses: actions/checkout@v4
        if: steps.target.outputs.ready == 'true'
        with:
          ref: ${{ github.ref }}
          fetch-depth: 1
          path: workflow

      - uses: actions/checkout@v4
        if: steps.target.outputs.ready == 'true'
        with:
          ref: gh-pages
          fetch-depth: 0
          path: pages

      - name: Install Node.js
        if: steps.target.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 25.9.0
          cache: npm
          cache-dependency-path: repo/interface/package-lock.json

      - name: Wait for deployed frontend to settle
        if: steps.target.outputs.ready == 'true'
        env:
          DEFAULT_DEPLOY_WAIT_MINUTES: ${{ vars.AURA_CHANGELOG_MEDIA_DEPLOY_WAIT_MINUTES }}
        shell: bash
        run: |
          wait_minutes="${{ inputs.deploy_wait_minutes }}"
          if [[ -z "$wait_minutes" ]]; then
            wait_minutes="$DEFAULT_DEPLOY_WAIT_MINUTES"
          fi
          if [[ -z "$wait_minutes" ]]; then
            wait_minutes="5"
          fi

          if ! [[ "$wait_minutes" =~ ^[0-9]+$ ]]; then
            echo "deploy_wait_minutes must be an integer number of minutes, got: $wait_minutes" >&2
            exit 1
          fi

          if [[ "$wait_minutes" -le 0 ]]; then
            echo "Skipping deploy settle wait."
            exit 0
          fi

          wait_seconds=$((wait_minutes * 60))
          echo "Waiting ${wait_minutes} minute(s) (${wait_seconds}s) before changelog media capture so the deployed frontend can settle."
          sleep "$wait_seconds"

      - name: Verify preview URL is reachable
        if: steps.target.outputs.ready == 'true'
        shell: bash
        run: |
          curl \
            --fail \
            --location \
            --silent \
            --show-error \
            --output /dev/null \
            --retry 3 \
            --retry-delay 10 \
            --max-time 30 \
            "${{ steps.preflight.outputs.url }}"

      - name: Install interface dependencies
        if: steps.target.outputs.ready == 'true'
        working-directory: repo/interface
        run: npm ci

      - name: Publish changelog screenshots into gh-pages
        if: steps.target.outputs.ready == 'true'
        id: capture
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
        shell: bash
        run: |
          ARGS=(
            --repo-dir repo
            --pages-dir pages
            --channel "${{ steps.target.outputs.channel }}"
            --provider "${{ steps.preflight.outputs.provider }}"
          )
          ARGS+=(--preview-url "${{ steps.preflight.outputs.url }}")

          if [[ -n "${{ steps.target.outputs.version }}" ]]; then
            ARGS+=(--version "${{ steps.target.outputs.version }}")
          fi
          if [[ -n "${{ steps.target.outputs.date }}" ]]; then
            ARGS+=(--date "${{ steps.target.outputs.date }}")
          fi
          if [[ -n "${{ inputs.profile }}" ]]; then
            ARGS+=(--profile "${{ inputs.profile }}")
          fi

          node repo/infra/scripts/release/publish-changelog-media.mjs "${ARGS[@]}"

      - name: Read changelog media summary
        if: always() && steps.target.outputs.ready == 'true'
        id: summary
        shell: bash
        run: |
          summary_file="repo/interface/output/demo-screenshots/publish-changelog-media/publish-changelog-media-summary.json"
          retry_file="repo/interface/output/demo-screenshots/publish-changelog-media/publish-changelog-media-retry.json"

          if [[ ! -f "$summary_file" ]]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "attempted=0" >> "$GITHUB_OUTPUT"
            echo "failed=0" >> "$GITHUB_OUTPUT"
            echo "published=0" >> "$GITHUB_OUTPUT"
            echo "skipped=0" >> "$GITHUB_OUTPUT"
            echo "workflow_outcome=failure" >> "$GITHUB_OUTPUT"
            echo "should_fail=true" >> "$GITHUB_OUTPUT"
            echo "strict_passed=false" >> "$GITHUB_OUTPUT"
            echo "retry_file=$retry_file" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "attempted=$(jq -r '.attempted // 0' "$summary_file")" >> "$GITHUB_OUTPUT"
          echo "failed=$(jq -r '.failed // 0' "$summary_file")" >> "$GITHUB_OUTPUT"
          echo "published=$(jq -r '.published // 0' "$summary_file")" >> "$GITHUB_OUTPUT"
          echo "skipped=$(jq -r '.skipped // 0' "$summary_file")" >> "$GITHUB_OUTPUT"
          workflow_outcome="$(jq -r '.workflowOutcome // "failure"' "$summary_file")"
          should_fail="$(jq -r '.shouldFailWorkflow // true' "$summary_file")"
          echo "workflow_outcome=$workflow_outcome" >> "$GITHUB_OUTPUT"
          echo "should_fail=$should_fail" >> "$GITHUB_OUTPUT"
          echo "strict_passed=$(jq -r '.strictRubricPassed // false' "$summary_file")" >> "$GITHUB_OUTPUT"
          echo "retry_file=$retry_file" >> "$GITHUB_OUTPUT"

      - name: Append changelog media diagnostics summary
        if: always() && steps.target.outputs.ready == 'true'
        shell: bash
        run: |
          summary_file="repo/interface/output/demo-screenshots/publish-changelog-media/publish-changelog-media-summary.md"
          if [[ -f "$summary_file" ]]; then
            cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload changelog media diagnostics
        if: always() && steps.target.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: changelog-media-diagnostics-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            repo/interface/output/demo-screenshots/publish-changelog-media
            pages/changelog/${{ steps.target.outputs.channel }}
            pages/assets/changelog/${{ steps.target.outputs.channel }}

      - name: Commit and push changelog media
        if: always() && steps.target.outputs.ready == 'true' && steps.summary.outputs.found == 'true'
        shell: bash
        run: |
          label="${{ steps.target.outputs.version }}"
          if [[ -z "$label" ]]; then
            label="${{ steps.target.outputs.date }}"
          fi
          bash workflow/infra/scripts/release/commit-gh-pages-with-retry.sh \
            pages \
            "Publish ${{ steps.target.outputs.channel }} changelog media for ${label}" \
            "changelog/${{ steps.target.outputs.channel }}" \
            "assets/changelog/${{ steps.target.outputs.channel }}"

      - name: Queue failed changelog media for retry
        if: always() && steps.target.outputs.ready == 'true' && steps.summary.outputs.found == 'true' && steps.summary.outputs.failed != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          retry_file="${{ steps.summary.outputs.retry_file }}"
          if [[ ! -f "$retry_file" ]]; then
            echo "Retry plan file is missing at $retry_file" >&2
            exit 1
          fi

          payload="$(jq -n \
            --arg ref "main" \
            --arg channel "${{ steps.target.outputs.channel }}" \
            --arg version "${{ steps.target.outputs.version }}" \
            --arg date "${{ steps.target.outputs.date }}" \
            --arg preview_url "${{ steps.preflight.outputs.url }}" \
            --arg provider "${{ steps.preflight.outputs.provider }}" \
            --arg profile "${{ inputs.profile }}" \
            --arg head_sha "$(git -C repo rev-parse HEAD)" \
            --arg source_run_id "${{ github.run_id }}" \
            --arg deploy_wait_minutes "2" \
            '{ref: $ref, inputs: {channel: $channel, version: $version, date: $date, preview_url: $preview_url, provider: $provider, profile: $profile, head_sha: $head_sha, source_run_id: $source_run_id, deploy_wait_minutes: $deploy_wait_minutes}}')"

          gh api "repos/${{ github.repository }}/actions/workflows/retry-release-changelog-media.yml/dispatches" \
            --method POST \
            --input - <<<"$payload"

      - name: Finalize changelog media outcome
        if: always() && steps.target.outputs.ready == 'true'
        shell: bash
        run: |
          if [[ "${{ steps.summary.outputs.found }}" != "true" ]]; then
            echo "Changelog media summary was not produced." >&2
            exit 1
          fi

          attempted="${{ steps.summary.outputs.attempted }}"
          published="${{ steps.summary.outputs.published }}"
          failed="${{ steps.summary.outputs.failed }}"
          skipped="${{ steps.summary.outputs.skipped }}"
          workflow_outcome="${{ steps.summary.outputs.workflow_outcome }}"
          should_fail="${{ steps.summary.outputs.should_fail }}"
          capture_outcome="${{ steps.capture.outcome }}"

          if [[ "$should_fail" == "true" ]]; then
            echo "Changelog media did not publish any screenshots for ${attempted} attempted slot(s); ${failed} slot(s) failed." >&2
            exit 1
          fi

          if [[ "$workflow_outcome" == "partial" ]]; then
            echo "::warning::Changelog media published ${published} screenshot(s), skipped ${skipped}, and queued retry for ${failed} failed slot(s)."
            exit 0
          fi

          if [[ "$capture_outcome" == "failure" ]]; then
            echo "::warning::Changelog media capture reported a recoverable issue, but no failed slots remain after summary processing."
          fi
